<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Sonar</title>
  <meta name="description" content="Waitlist signups dashboard.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
</head>
<body>

  <canvas id="bgConstellation" aria-hidden="true"></canvas>
  <script src="bg.js" defer></script>

  <header class="site">
    <div class="wrap">
      <a class="logo" href="index.html"><svg class="logo-mark" viewBox="0 0 64 64" width="26" height="26"><rect width="64" height="64" rx="16" fill="#7c3aed"/><circle cx="32" cy="32" r="4" fill="white"/><circle cx="32" cy="32" r="13" fill="none" stroke="white" stroke-width="3" opacity="0.85"/><circle cx="32" cy="32" r="22" fill="none" stroke="white" stroke-width="3" opacity="0.5"/></svg>Sonar</a>
      <nav class="site-nav">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="get-in-touch.html">Contact</a>
        <a href="board.html">Board</a>
        <a href="contact.html" class="nav-cta">Try it free</a>
      </nav>
    </div>
  </header>

  <section class="section section-decor">
    <div class="wrap">
      <h1 style="margin-bottom:24px;">Waitlist signups</h1>

      <div class="table-wrap">
        <table class="kanban-table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Message</th>
              <th>Signup date</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="waitlistTableBody"></tbody>
        </table>
      </div>
    </div>
  </section>

  <footer class="site">
    <div class="wrap">
      &copy; 2026 Cameron Dowd — Sonar
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="config.js"></script>
  <script>
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const tableBodyEl = document.getElementById('waitlistTableBody');

    function formatDate(iso) {
      if (!iso) return '';
      return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    async function loadWaitlist() {
      const { data, error } = await supabaseClient
        .from('waitlist')
        .select('*')
        .order('created_at', { ascending: false });

      if (error) {
        tableBodyEl.innerHTML = `<tr><td colspan="5"><p class="empty-state">Error loading signups: ${error.message}</p></td></tr>`;
        return;
      }

      if (!data || data.length === 0) {
        tableBodyEl.innerHTML = '<tr><td colspan="5"><p class="empty-state">No signups yet.</p></td></tr>';
        return;
      }

      tableBodyEl.innerHTML = '';
      data.forEach(row => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td class="company-cell">${row.name}</td>
          <td>${row.email}</td>
          <td>${row.message || ''}</td>
          <td>${formatDate(row.created_at)}</td>
          <td>${row.status || ''}</td>
        `;
        tableBodyEl.appendChild(tr);
      });
    }

    loadWaitlist();
  </script>

</body>
</html>
