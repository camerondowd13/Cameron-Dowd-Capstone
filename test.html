<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test — Sonar</title>
  <meta name="description" content="Raw view of live Supabase accounts data.">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
</head>
<body>

  <header class="site">
    <div class="wrap">
      <a class="logo" href="index.html"><svg class="logo-mark" viewBox="0 0 64 64" width="26" height="26"><rect width="64" height="64" rx="16" fill="#7c3aed"/><circle cx="32" cy="32" r="4" fill="white"/><circle cx="32" cy="32" r="13" fill="none" stroke="white" stroke-width="3" opacity="0.85"/><circle cx="32" cy="32" r="22" fill="none" stroke="white" stroke-width="3" opacity="0.5"/></svg>Sonar</a>
      <nav class="site-nav">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="get-in-touch.html" class="nav-cta-secondary">Contact</a>
        <a href="contact.html" class="nav-cta">Try it free</a>
      </nav>
    </div>
  </header>

  <section class="section">
    <div class="wrap prose">
      <h1>Accounts — raw table view</h1>
      <p>Every row currently in the Supabase <code>accounts</code> table, unfiltered.</p>

      <div id="results"></div>
    </div>
  </section>

  <footer class="site">
    <div class="wrap">
      &copy; 2026 Cameron Dowd — Sonar
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="config.js"></script>
  <script>
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const resultsEl = document.getElementById('results');

    async function loadAccounts() {
      const { data, error } = await supabaseClient.from('accounts').select('*');

      if (error) {
        resultsEl.innerHTML = `<p class="empty-state">Error loading accounts: ${error.message}</p>`;
        return;
      }

      if (!data || data.length === 0) {
        resultsEl.innerHTML = '<p class="empty-state">Table is empty. Add rows to see them here.</p>';
        return;
      }

      resultsEl.innerHTML = '';
      data.forEach(row => {
        const card = document.createElement('div');
        card.className = 'result-card';
        card.innerHTML = `
          <h4>${row.name}</h4>
          <div class="meta">${row.status} · ${row.territory} · ${row.industry}</div>
        `;
        resultsEl.appendChild(card);
      });
    }

    loadAccounts();
  </script>

</body>
</html>
